<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>遇事不决 · 读毛选</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111118">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="读毛选">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ============================================================
   CSS 变量 — 默认：深色+阅读模式
   ============================================================ */
:root{
  --bg:radial-gradient(ellipse at 50% 55%,#1A1A22 0%,#111118 40%,#0A0A10 100%);
  --bg-flat:#111118;
  --text:#E2D4B8;
  --text-dim:#A89878;
  --text-bright:#F5ECD7;
  --accent:#D4A840;
  --accent-glow:rgba(212,168,64,.4);
  --accent-dim:rgba(212,168,64,.25);
  --card-bg:linear-gradient(160deg,#15151D 0%,#1C1820 50%,#111019 100%);
  --card-bg-flat:#15151D;
  --card-border:#D4A840;
  --card-border-dim:rgba(212,168,64,.2);
  --card-text:#E2D4B8;
  --card-shadow:0 12px 50px rgba(0,0,0,.7);
  --action-bg:rgba(212,168,64,.06);
  --action-border:rgba(212,168,64,.14);
  --btn-bg:rgba(212,168,64,.05);
  --btn-text:#D4A840;
  --btn-border:rgba(212,168,64,.45);
  --btn-hover:rgba(212,168,64,.14);
  --divider:linear-gradient(90deg,transparent,rgba(212,168,64,.45),transparent);
  --star-color:#C9A227;
  --star-opacity:.25;
  --deck-bg:linear-gradient(145deg,#6B0000 0%,#8B0000 40%,#A01010 100%);
  --deck-symbol:#DAA520;
  --deck-border:#DAA520;
  --overlay-bg:rgba(0,0,0,.5);
  --panel-bg:rgba(20,18,25,.97);
  --panel-text:#E2D4B8;
  --panel-border:rgba(212,168,64,.2);
  --toggle-bg:rgba(255,255,255,.08);
  --toggle-active:rgba(212,168,64,.2);
  --font-size:16px;
  --line-height:2.4;
  --transition-speed:.4s;
  /* 统一卡牌尺寸 */
  --card-w:min(88vw,360px);
  --card-h:min(110vw,480px);
}

/* ===== 重置 ===== */
*{margin:0;padding:0;box-sizing:border-box}
html{
  font-size:16px;
  width:100%;height:100%;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}
body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);
  font-family:'STKaiti','KaiTi','楷体','Noto Serif SC',serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
  transition:background .5s ease;
  /* 内容主容器居中，平板端限宽 */
}
body::before{
  content:'';position:fixed;top:0;left:50%;
  width:min(100vw,440px);height:100%;
  transform:translateX(-50%);
  pointer-events:none;z-index:-1;
}

/* ===== 星空 ===== */
#starsBox{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

/* ===== 标题栏 ===== */
#titleBar{
  position:absolute;top:max(1rem,env(safe-area-inset-top,12px));left:0;width:100%;text-align:center;
  z-index:20;pointer-events:none;
}
#titleBar h1{
  font-size:clamp(.85rem,3.6vw,1rem);color:var(--accent);letter-spacing:.35em;font-weight:900;
  text-shadow:0 0 18px var(--accent-glow),0 0 36px var(--accent-dim);
  line-height:1.7;margin:0;
  transition:color .4s ease;
}
#titleBar h1::after{
  content:'';display:block;margin:.3rem auto 0;
  width:clamp(3rem,14vw,4.5rem);height:1px;
  background:var(--divider);
  transition:background .4s ease;
}

/* ===== 设置按钮 ===== */
#settingsBtn{
  position:absolute;top:max(.8rem,env(safe-area-inset-top,10px));right:max(.7rem,env(safe-area-inset-right,10px));z-index:40;
  width:2.2rem;height:2.2rem;border-radius:50%;
  background:var(--btn-bg);border:1px solid var(--btn-border);
  color:var(--accent);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s ease;line-height:1;
}
#settingsBtn:hover{background:var(--btn-hover)}
#settingsBtn:active{transform:scale(.92)}

/* ===== PWA 安装提示 ===== */
#installBanner{
  position:fixed;bottom:max(1rem,env(safe-area-inset-bottom,10px));
  left:50%;transform:translateX(-50%);
  z-index:200;display:none;
  background:var(--panel-bg);border:1px solid var(--accent);
  border-radius:12px;padding:.85rem 1.1rem;
  color:var(--text);font-size:.85rem;
  align-items:center;gap:.7rem;
  max-width:min(90vw,380px);
  box-shadow:0 4px 24px rgba(0,0,0,.5);
}
#installBanner.show{display:flex}
#installBanner span{flex:1;line-height:1.4}
#installBtn{
  background:var(--accent);color:#111118;border:none;
  border-radius:8px;padding:.45rem 1rem;font-size:.8rem;
  font-weight:bold;cursor:pointer;white-space:nowrap;
  font-family:inherit;
}
#installDismiss{
  background:none;border:none;color:var(--text-dim);
  font-size:1.2rem;cursor:pointer;padding:0 .2rem;
  line-height:1;
}

/* ===== 牌堆 ===== */
#deckArea{
  position:relative;cursor:pointer;
  width:var(--card-w);
  height:var(--card-h);
  max-width:360px;max-height:480px;
  z-index:10;
}
.deck-card{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:var(--deck-bg);
  border:2px solid var(--deck-border);
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,200,0,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:default;
  transition:transform .5s ease,opacity .5s ease;
}
.deck-card::before{
  content:'';position:absolute;inset:5px;
  border:1px solid rgba(218,165,32,.2);
  border-radius:8px;pointer-events:none;
}
.deck-card::after{
  content:'';position:absolute;inset:0;border-radius:12px;pointer-events:none;
  background:
    linear-gradient(135deg,rgba(218,165,32,.3) 0%,transparent 28%) top left/18px 18px no-repeat,
    linear-gradient(225deg,rgba(218,165,32,.3) 0%,transparent 28%) top right/18px 18px no-repeat,
    linear-gradient(45deg,rgba(218,165,32,.3) 0%,transparent 28%) bottom left/18px 18px no-repeat,
    linear-gradient(315deg,rgba(218,165,32,.3) 0%,transparent 28%) bottom right/18px 18px no-repeat;
}
.deck-card .card-symbol{
  font-size:clamp(2rem,12vw,3rem);color:var(--deck-symbol);opacity:.8;
  font-family:'STKaiti','KaiTi','楷体',serif;
  text-shadow:0 0 10px rgba(218,165,32,.35);z-index:1;
}
#topCard{z-index:20;cursor:pointer;transition:transform .6s cubic-bezier(.22,1,.2,1),opacity .3s ease}
#topCard .card-symbol{font-size:clamp(2.5rem,14vw,3.5rem);opacity:1}
#topCard::after{
  content:'';position:absolute;inset:-3px;border-radius:14px;
  background:transparent;border:1px solid rgba(218,165,32,.25);
  animation:glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 6px rgba(218,165,32,.15);border-color:rgba(218,165,32,.15)}
  50%{box-shadow:0 0 18px rgba(218,165,32,.4);border-color:rgba(218,165,32,.5)}
}

/* ===== 牌背图片模式 ===== */
.deck-card[data-back="yushi"]{
  background-image:url('back-yushi.png') !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  border-color:var(--card-border-dim) !important;
  box-shadow:none !important;
  overflow:hidden;
}
.deck-card[data-back="weimin"]{
  background-image:url('back-weimin.png') !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  border-color:var(--card-border-dim) !important;
  box-shadow:none !important;
  overflow:hidden;
}
.deck-card[data-back="yushi"] .card-symbol,
.deck-card[data-back="weimin"] .card-symbol{
  display:none;
}

.fly-front[data-back="yushi"]{
  background-image:url('back-yushi.png') !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  border-color:var(--card-border-dim) !important;
  box-shadow:none !important;overflow:hidden;
}
.fly-front[data-back="weimin"]{
  background-image:url('back-weimin.png') !important;
  background-size:cover !important;
  background-position:center !important;
  background-repeat:no-repeat !important;
  border-color:var(--card-border-dim) !important;
  box-shadow:none !important;overflow:hidden;
}

/* ===== 抽牌按钮 ===== */
/* ===== 飞牌 ===== */
#flyCard{
  display:none;position:fixed;z-index:100;
  left:50%;top:50%;
  width:var(--card-w);height:var(--card-h);
  transform:translate(-50%,-50%);
  perspective:1200px;
  transition:opacity .3s ease,border-radius .4s ease;
}
#flyInner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .85s cubic-bezier(.42,0,.58,1);
  border-radius:inherit;
}
.fly-front{
  position:absolute;inset:0;backface-visibility:hidden;
  background:var(--deck-bg);
  border:2px solid var(--deck-border);border-radius:inherit;
  box-shadow:inset 0 0 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,200,0,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;color:var(--deck-symbol);
  font-family:'STKaiti','KaiTi','楷体',serif;
  text-shadow:0 0 10px rgba(218,165,32,.35);z-index:1;
}
.fly-front::before{
  content:'';position:absolute;inset:5px;
  border:1px solid rgba(218,165,32,.2);
  border-radius:inherit;pointer-events:none;
}
.fly-front::after{
  content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:
    linear-gradient(135deg,rgba(218,165,32,.3) 0%,transparent 28%) top left/18px 18px no-repeat,
    linear-gradient(225deg,rgba(218,165,32,.3) 0%,transparent 28%) top right/18px 18px no-repeat,
    linear-gradient(45deg,rgba(218,165,32,.3) 0%,transparent 28%) bottom left/18px 18px no-repeat,
    linear-gradient(315deg,rgba(218,165,32,.3) 0%,transparent 28%) bottom right/18px 18px no-repeat;
}
.fly-back{
  position:absolute;inset:0;backface-visibility:hidden;
  background:var(--card-bg);
  border:2px solid var(--card-border);border-radius:inherit;
  transform:rotateY(180deg);
  display:flex;flex-direction:column;padding:1rem .85rem;
  overflow-y:auto;color:var(--card-text);
  transition:background .4s ease;
}

/* ===== 结果卡 ===== */
#resultCard{
  display:none;position:fixed;z-index:100;
  left:50%;top:50%;transform:translate(-50%,-50%);
  width:var(--card-w);
  height:var(--card-h);
  background:var(--card-bg);
  border:1.5px solid var(--card-border);border-radius:.9rem;
  box-shadow:var(--card-shadow),0 0 35px var(--accent-dim),inset 0 1px 0 rgba(255,200,0,.06);
  padding:.9rem .8rem .7rem;overflow-y:auto;
  animation:resultIn .5s ease;
  transition:background .4s ease,border-color .4s ease,box-shadow .4s ease;
}
#resultCard::before{
  content:'';position:absolute;inset:5px;border-radius:10px;pointer-events:none;
  border:1px solid var(--card-border-dim);
}
@keyframes resultIn{
  from{opacity:0;transform:translate(-50%,-50%) scale(.82)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}
#resultCard.show{display:flex;flex-direction:column;box-sizing:border-box}

/* ===== 结果卡内容 ===== */
#resultText{
  font-size:var(--font-size,1rem);color:var(--card-text);text-align:center;
  margin-bottom:.6rem;padding:0 .15em;
  text-shadow:0 1px 3px rgba(0,0,0,.4);
  transition:color .4s ease,font-size .3s ease;
}
.quote-line{
  line-height:var(--line-height,2.4);letter-spacing:.1em;
  transition:line-height .3s ease;
}
#divider{height:1px;background:var(--divider);margin:0 .3rem .6rem;transition:background .4s ease}

.section-label{
  display:block;font-size:.65rem;color:var(--accent);letter-spacing:.35em;
  text-align:center;margin-bottom:.4rem;opacity:.7;
  text-shadow:0 0 6px var(--accent-dim);
  transition:color .4s ease;
}
#resultSrcText{
  font-size:.75rem;color:var(--text-dim);text-align:center;margin-bottom:.7rem;
  line-height:1.6;transition:color .4s ease;
}
#resultAction{
  font-size:.8rem;color:var(--text-dim);line-height:1.9;text-align:left;
  white-space:pre-line;
  padding:.55rem .7rem;background:var(--action-bg);
  border-radius:.5rem;border:1px solid var(--action-border);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.15);
  max-height:30vh;overflow-y:auto;
  transition:all .4s ease;
}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:auto;padding-top:.5rem}
.action-btn{
  padding:.5rem 1.2rem;border-radius:1.4rem;
  border:1px solid var(--btn-border);background:transparent;
  color:var(--btn-text);font-size:.8rem;cursor:pointer;
  font-family:'STKaiti','KaiTi','楷体',serif;letter-spacing:.15em;
  transition:all .3s ease;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.action-btn:hover{
  background:var(--btn-hover);border-color:var(--accent);
  box-shadow:0 0 14px var(--accent-dim);transform:scale(1.03);
}
.action-btn:active{
  background:rgba(212,168,64,.22);transform:scale(.94);
  transition:all .08s ease;
}

/* ===== 粒子 ===== */
#particleBox{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:90}
.pp{position:absolute;border-radius:50%;animation:spread 1.5s ease-out forwards}
@keyframes spread{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}
}

/* ============================================================
   设置面板
   ============================================================ */
#settingsOverlay{
  position:fixed;inset:0;z-index:200;
  background:var(--overlay-bg);opacity:0;pointer-events:none;
  transition:opacity .35s ease;
}
#settingsOverlay.show{opacity:1;pointer-events:auto}

#settingsPanel{
  position:fixed;left:0;right:0;bottom:0;z-index:210;
  background:var(--panel-bg);
  border-radius:1.2rem 1.2rem 0 0;
  padding:0 max(1rem,env(safe-area-inset-left,16px)) max(1.5rem,env(safe-area-inset-bottom,16px)) max(1rem,env(safe-area-inset-right,16px));
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(.22,1,.2,1),background .4s ease;
  max-height:88vh;overflow-y:auto;
}
#settingsPanel.show{transform:translateY(0)}

.panel-handle{
  width:2rem;height:4px;background:var(--panel-border);
  border-radius:2px;margin:.75rem auto 1.2rem;
}
.panel-title{
  text-align:center;font-size:.95rem;color:var(--panel-text);
  letter-spacing:.25em;margin-bottom:1.2rem;
  font-weight:700;
}
.panel-section{margin-bottom:1.2rem}
.panel-label{
  font-size:.75rem;color:var(--text-dim);letter-spacing:.15em;margin-bottom:.6rem;
  display:block;transition:color .4s ease;
}

/* 主题切换（浅色/深色） */
.theme-toggle{
  display:flex;background:var(--toggle-bg);border-radius:1.4rem;
  padding:3px;transition:background .4s ease;
}
.theme-opt{
  flex:1;text-align:center;padding:.5rem 0;border-radius:1.2rem;
  font-size:.8rem;cursor:pointer;color:var(--text-dim);
  transition:all .3s ease;font-family:inherit;border:none;background:none;
  -webkit-tap-highlight-color:transparent;
}
.theme-opt.active{
  background:var(--toggle-active);color:var(--accent);
  font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.15);
}

/* 模式切换（护眼/阅读/强光） */
.mode-row{
  display:flex;gap:.5rem;
}
.mode-opt{
  flex:1;text-align:center;padding:.6rem .25rem;border-radius:.75rem;
  font-size:.75rem;cursor:pointer;color:var(--text-dim);
  border:1px solid var(--panel-border);
  background:var(--btn-bg);
  transition:all .3s ease;font-family:inherit;
  letter-spacing:.05em;
  -webkit-tap-highlight-color:transparent;
}
.mode-opt.active{
  background:var(--toggle-active);border-color:var(--accent);
  color:var(--accent);font-weight:700;
}
.mode-icon{display:block;font-size:1.25rem;margin-bottom:.25rem}

/* 字号调节 */
.size-control{
  display:flex;align-items:center;justify-content:center;gap:.85rem;
}
.size-btn{
  width:2rem;height:2rem;border-radius:50%;
  border:1px solid var(--panel-border);background:var(--btn-bg);
  color:var(--accent);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;font-family:inherit;line-height:1;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.size-btn:hover{background:var(--btn-hover)}
.size-btn:active{transform:scale(.9)}
.size-val{
  font-size:.95rem;color:var(--panel-text);min-width:2.5rem;text-align:center;
  transition:color .4s ease;
}
.size-label{
  font-size:.7rem;color:var(--text-dim);margin-left:.25rem;transition:color .4s ease;
}

/* 行距调节 */
.spacing-control{
  display:flex;align-items:center;justify-content:center;gap:14px;
}

/* 面板底部 */
.panel-footer{
  text-align:center;margin-top:1.2rem;
}
.panel-close{
  padding:.6rem 2.2rem;border-radius:1.4rem;
  border:1px solid var(--btn-border);background:var(--btn-bg);
  color:var(--btn-text);font-size:.85rem;cursor:pointer;
  font-family:inherit;letter-spacing:.2em;
  transition:all .3s ease;
  -webkit-tap-highlight-color:transparent;
}
.panel-close:hover{background:var(--btn-hover)}
.panel-close:active{transform:scale(.94);transition:all .08s ease}

/* ===== 模式切换反馈提示 ===== */
#modeToast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);
  z-index:300;pointer-events:none;
  background:var(--panel-bg);color:var(--accent);
  padding:.5rem 1.2rem;border-radius:1.2rem;
  font-size:.8rem;letter-spacing:.1em;
  opacity:0;transition:all .3s ease;
  border:1px solid var(--accent);
  white-space:nowrap;
}
#modeToast.show{
  opacity:1;transform:translate(-50%,-50%) scale(1);
}

/* ============================================================
   响应式断点
   ============================================================ */

/* 手机横屏 (480px~768px) — 统一卡牌尺寸变量 */
@media(min-width:480px) and (max-width:767px){
  html{font-size:17px}
  :root{
    --card-w:min(75vw,360px);
    --card-h:min(105vw,500px);
  }
}

/* 平板 (768px+) — 限宽居中，统一卡牌尺寸变量 */
@media(min-width:768px){
  html{font-size:18px}
  :root{
    --card-w:min(60vw,420px);
    --card-h:min(95vw,520px);
  }
  body::before{width:min(100vw,520px)}
  .deck-card .card-symbol{font-size:3rem}
  #topCard .card-symbol{font-size:3.5rem}
  #resultCard{
    border-radius:1rem;
    padding:1.5rem 1.2rem 1.2rem;
  }
  #settingsPanel{
    max-width:440px;
    left:50%;
    transform:translate(-50%,100%);
    border-radius:1.4rem 1.4rem 0 0;
  }
  #settingsPanel.show{
    transform:translate(-50%,0);
  }
  #settingsBtn{
    width:2.5rem;height:2.5rem;font-size:1.2rem;
    top:max(1rem,env(safe-area-inset-top,12px));
    right:max(1rem,env(safe-area-inset-right,12px));
  }
  #flyCard{
    /* 飞牌最终尺寸跟随 resultCard */
  }
}

/* 大屏平板/桌面 (1024px+) — 更宽松的留白 */
@media(min-width:1024px){
  html{font-size:20px}
  :root{--card-w:min(50vw,480px)}
  body::before{width:min(100vw,560px)}
  #settingsPanel{max-width:480px}
}

/* 深色模式下滚动条 */
@media(prefers-color-scheme:dark){
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(212,168,64,.2);border-radius:2px}
}
</style>
</head>
<body>

<div id="installBanner"><span>将「读毛选」添加到主屏幕，随时获取智慧指引</span><button id="installBtn">安装</button><button id="installDismiss">×</button></div>

<div id="starsBox"></div>

<div id="titleBar">
  <h1>遇事不决 · 读毛选</h1>
</div>

<button id="settingsBtn" title="阅读设置">⚙</button>

<div id="deckArea">

<!-- 设置面板 -->
<div id="settingsPanel">

  <div class="panel-section">
    <span class="panel-label">主题</span>
    <div class="theme-toggle" id="themeToggle">
      <button class="theme-opt active" data-theme="light">浅色</button>
      <button class="theme-opt" data-theme="dark">深色</button>
    </div>
  </div>

  <div class="panel-section">
    <span class="panel-label">色彩模式</span>
    <div class="mode-row" id="modeRow">
      <button class="mode-opt" data-mode="eye">
        <span class="mode-icon">🌿</span>护眼
      </button>
      <button class="mode-opt active" data-mode="reading">
        <span class="mode-icon">📖</span>阅读
      </button>
      <button class="mode-opt" data-mode="bright">
        <span class="mode-icon">☀️</span>强光
      </button>
    </div>
  </div>

  <div class="panel-section">
    <span class="panel-label">字号</span>

      <span class="size-val" id="sizeVal">16</span><span class="size-label">px</span>
      <button class="size-btn" data-action="up">+</button>

  <div class="panel-section">
    <span class="panel-label">行距</span>
    <div class="spacing-control" id="spacingControl">
      <button class="size-btn" data-action="down">−</button>
      <span class="size-val" id="spacingVal">2.4</span><span class="size-label">倍</span>
      <button class="size-btn" data-action="up">+</button>
    </div>
  </div>

  <div class="panel-section">
    <span class="panel-label">牌背样式</span>
    <div class="mode-row" id="backRow">
      <button class="mode-opt active" data-back="classic">
        <span class="mode-icon">☭</span>经典红
      </button>
      <button class="mode-opt" data-back="yushi">
        <span class="mode-icon">📜</span>遇事不决
      </button>
      <button class="mode-opt" data-back="weimin">
        <span class="mode-icon">⭐</span>为人民服务
      </button>
    </div>
  </div>

  <div class="panel-footer">
    <button class="panel-close" id="panelClose">完 成</button>
  </div>
</div>

['客观现实世界的变化运动永远没有完结，人们在实践中对于真理的认识也就永远没有完结。','《实践论》','第一卷','实践论','https://www.qstheory.cn/books/2019-07/31/c_1119448591_9.htm','① 永远保持学习心态，世界在变\n② 昨天的成功经验今天可能失效\n③ 定期审视自己的认知是否已过时'],
['捉住了主要矛盾，一切问题就迎刃而解了。','《矛盾论》（1937年）','第一卷','矛盾论','https://www.qstheory.cn/books/2019-07/31/c_1119448591_10.htm','① 面对一堆问题先全部列出来\n② 如果只能解决一个选哪个？（主要矛盾）\n③ 集中全部精力解决这一个，其他会随之缓解'],

['事物发展的根本原因，不是在事物的外部而是在事物的内部，在于事物内部的矛盾性。','《矛盾论》','第一卷','矛盾论','https://www.qstheory.cn/books/2019-07/31/c_1119448591_10.htm','① 寻找问题的根本原因而不是表面原因\n② 问5个"为什么"深挖到内因\n③ 内因改变了，外因会自动调整'],
['没有什么事物是不包含矛盾的，没有矛盾就没有世界。','《矛盾论》','第一卷','矛盾论','https://www.qstheory.cn/books/2019-07/31/c_1119448591_10.htm','① 出现矛盾是正常的，没有矛盾才奇怪\n② 把矛盾看作推动进步的动力\n③ 建设性地处理矛盾，不要回避'],

['研究问题，忌带主观性、片面性和表面性。','《矛盾论》','第一卷','矛盾论','https://www.qstheory.cn/books/2019-07/31/c_1119448591_10.htm','① 分析问题至少看三面：正面、反面、侧面\n② 不要只看局部就下结论\n③ 深入一层看本质，不要停留在表面现象'],
['星星之火，可以燎原。','《星星之火，可以燎原》（1930年）','第一卷','信念与坚持','https://www.qstheory.cn/books/2019-07/31/c_1119448591_6.htm','① 不要因为事情小就不开始——最小的一步也是进步\n② 找到一个能自然扩散的"火种"\n③ 耐心积累，量变终会引发质变'],
['它（革命高潮）是站在海岸遥望海中已经看得见桅杆尖头了的一只航船，它是立于高山之巅远看东方已见光芒四射喷薄欲出的一轮朝日。','《星星之火，可以燎原》','第一卷','信念与坚持','https://www.qstheory.cn/books/2019-07/31/c_1119448591_6.htm','① 当你看不到进展时，相信积累的力量\n② 成功往往在最黑暗时即将到来\n③ 保持信念——黎明前的黑夜最长'],

['集中优势兵力，各个歼灭敌人。','《目前形势和我们的任务》','第四卷','战略战术','https://www.qstheory.cn/books/2019-07/31/c_1119448591_6.htm','① 一次只专注一个目标\n② 把所有资源集中到最重要的那件事上\n③ 不要同时打几场仗，逐个击破'],

['群众中蕴藏了一种极大的社会主义的积极性。','《〈中国农村的社会主义高潮〉的序言》（1955年）','第五卷','团队与协作','https://www.qstheory.cn/books/2019-07/31/c_1119448591_6.htm','① 群众的潜力远超你的想象\n② 善于发现和激发团队的积极性\n③ 被激发的团队能创造奇迹'],

['我们各方面的建设方针，就是调动一切积极因素，并且化消极因素为积极因素。','《增强党的团结，继承党的传统》（1956年）','第五卷','领导力','https://www.qstheory.cn/books/2019-07/31/c_1119448591_6.htm','① 调动积极因素：用好已有资源\n② 化消极为积极：转化不利因素\n③ 管理的核心是转化——不是消灭而是转化'],

['团结—批评—团结，就是说，从团结的愿望出发，经过批评或者斗争使矛盾得到解决，从而在新的基础上达到新的团结。','《党内团结的辩证方法》（1957年）','第五卷','团队与协作','https://www.qstheory.cn/books/2019-07/31/c_1119448591_6.htm','① 先有团结的意愿再批评\n② 批评是为了更好的团结\n③ 批评后要重建信任——形成新的团结'],

/* ========== 星空 ========== */
(function(){
  var b=E('starsBox');
  for(var i=0;i<40;i++){
    var s=document.createElement('div');
    s.style.cssText='position:absolute;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;background:var(--star-color);border-radius:50%;opacity:'+(.12+Math.random()*.28)+';animation:twinkle '+(2+Math.random()*3)+'s ease-in-out '+Math.random()*3+'s infinite';
    b.appendChild(s);
  }
  var st=document.createElement('style');
  st.textContent='@keyframes twinkle{0%,100%{opacity:.12}50%{opacity:.5}}';
  document.head.appendChild(st);
})();

/* ========== 粒子 ========== */
function spawnParticles(){
  var b=E('particleBox'),cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(var i=0;i<22;i++){
    var p=document.createElement('div');p.className='pp';
    var a=(Math.PI*2/22)*i+(Math.random()-.5),d=70+Math.random()*110;
    p.style.cssText='left:'+cx+'px;top:'+cy+'px;width:'+(2+Math.random()*4)+'px;height:'+(2+Math.random()*4)+'px;background:'+(Math.random()>.5?'#C9A227':'#B22222')+';--px:'+Math.cos(a)*d+'px;--py:'+Math.sin(a)*d+'px';
    b.appendChild(p);setTimeout(function(p2){return function(){p2.remove()}}(p),1700);
  }
}

/* ========== 当前设置状态 ========== */
var currentTheme='light';
var currentMode='reading';
var currentFontSize=16;
var currentLineHeight=2.4;

/* ========== 应用主题 ========== */
function applyTheme(theme,mode){
  var s=COLOR_SCHEMES[theme][mode];
  var r=document.documentElement.style;
  var keys={
    '--bg':'bg','--bg-flat':'bgFlat','--text':'text','--text-dim':'textDim',
    '--text-bright':'textBright','--accent':'accent','--accent-glow':'accentGlow',
    '--accent-dim':'accentDim','--card-bg':'cardBg','--card-bg-flat':'cardBgFlat',
    '--card-text':'cardText','--card-border':'cardBorder',
    '--card-border-dim':'cardBorderDim','--card-shadow':'cardShadow',
    '--action-bg':'actionBg','--action-border':'actionBorder',
    '--btn-bg':'btnBg','--btn-text':'btnText','--btn-border':'btnBorder',
    '--btn-hover':'btnHover','--divider':'divider',
    '--star-color':'starColor','--overlay-bg':'overlayBg',
    '--panel-bg':'panelBg','--panel-text':'panelText',
    '--panel-border':'panelBorder','--toggle-bg':'toggleBg',
    '--toggle-active':'toggleActive'
  };
  for(var k in keys){
    if(s.hasOwnProperty(keys[k])) r.setProperty(k,s[keys[k]]);
  }
  currentTheme=theme;currentMode=mode;
  // Update star particles
  updateStarColors();
  // Save to localStorage
  try{
    localStorage.setItem('mao-tarot-theme',theme);
    localStorage.setItem('mao-tarot-mode',mode);
    localStorage.setItem('mao-tarot-fontSize',currentFontSize);
    localStorage.setItem('mao-tarot-lineHeight',currentLineHeight);
  }catch(e){}
}

/* ========== 更新星空颜色 ========== */
function updateStarColors(){
  var stars=document.querySelectorAll('#starsBox div');
  var s=COLOR_SCHEMES[currentTheme][currentMode];
  for(var i=0;i<stars.length;i++){
    stars[i].style.background=s.starColor;
  }
}

/* ========== 显示 Toast 反馈 ========== */
var toastTimer;
function showToast(msg){
  var t=E('modeToast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove('show')},1800);
}

/* ========== 设置面板逻辑 ========== */
// 打开面板
function openSettings(){
  E('settingsOverlay').classList.add('show');
  E('settingsPanel').classList.add('show');
  // 同步UI状态
  syncPanelUI();
}

// 关闭面板
function closeSettings(){
  E('settingsOverlay').classList.remove('show');
  E('settingsPanel').classList.remove('show');
}

// 同步面板UI
function syncPanelUI(){
  var topts=E('themeToggle').querySelectorAll('.theme-opt');
  for(var i=0;i<topts.length;i++){
    topts[i].classList.toggle('active',topts[i].dataset.theme===currentTheme);
  }
  var mopts=E('modeRow').querySelectorAll('.mode-opt');
  for(var i=0;i<mopts.length;i++){
    mopts[i].classList.toggle('active',mopts[i].dataset.mode===currentMode);
  }
  E('sizeVal').textContent=currentFontSize;
  E('spacingVal').textContent=currentLineHeight.toFixed(1);
  var bopts=E('backRow').querySelectorAll('.mode-opt');
  for(var i=0;i<bopts.length;i++){
    bopts[i].classList.toggle('active',bopts[i].dataset.back===currentBack);
  }
}

// 主题切换
E('themeToggle').addEventListener('click',function(e){
  var btn=e.target.closest('.theme-opt');
  if(!btn)return;
  var theme=btn.dataset.theme;
  if(theme===currentTheme)return;
  applyTheme(theme,currentMode);
  syncPanelUI();
  var label=theme==='light'?'浅色':'深色';

});

E('spacingControl').addEventListener('click',function(e){

    if(t && COLOR_SCHEMES[t] && COLOR_SCHEMES[t][m||'reading']){
      currentTheme=t;currentMode=m||'reading';
    }
    if(fs) currentFontSize=parseInt(fs)||16;
    if(lh) currentLineHeight=parseFloat(lh)||2.4;
    if(bs && ['classic','yushi','weimin'].indexOf(bs)>=0){
      applyBackStyle(bs);
    }
    document.documentElement.style.setProperty('--font-size',currentFontSize+'px');
    document.documentElement.style.setProperty('--line-height',currentLineHeight);
  }catch(e){}
  applyTheme(currentTheme,currentMode);
})();

/* ========== 抽取卡牌 ========== */
function drawCard(){
  if(animating)return;
  animating=true;

  // 强制重置 flyInner：清 transition，重置 transform，防上轮残留
  var fly=E('flyCard'),flyIn=E('flyInner');
  flyIn.style.transition='none';
  flyIn.style.transform='rotateY(0deg)';
  void flyIn.offsetWidth;

  if(history.length>=N)history=[];
  var wi;
  do{wi=Math.floor(Math.random()*N)}while(history.indexOf(wi)>=0);
  history.push(wi);currentIdx=wi;
  var wq=Q[wi];

  // 1. 飞牌（始终居中，不做位移动画，只淡入+翻转）
  var fly=E('flyCard'),flyIn=E('flyInner');
  flyIn.style.transition='none';
  flyIn.style.transform='rotateY(0deg)';
  fly.style.transition='none';
  fly.style.display='block';fly.style.opacity='0';
  // 清除残留 JS 尺寸，让 CSS 变量生效
  fly.style.width='';fly.style.height='';
  fly.style.borderRadius='13px';

  topCard.style.opacity='0';

  void fly.offsetWidth;

  fly.style.transition='opacity .3s ease,border-radius .4s ease';
  fly.style.opacity='1';

  // 翻面
  setTimeout(function(){
    fly.style.transition='opacity .4s ease';
    flyIn.style.transition='transform 0.85s cubic-bezier(.42,0,.58,1)';
    flyIn.style.transform='rotateY(180deg)';
    spawnParticles();
  },700);

  // 显示结果：飞牌淡出，结果卡由 CSS 变量决定尺寸（与飞牌一致）
  setTimeout(function(){
    var fly=E('flyCard');
    fly.style.opacity='0';
    setTimeout(function(){fly.style.display='none'},450);
    showResult(wi,wq);
    topCard.style.opacity='1';animating=false;
  },1900);
}

/* ========== 语录文字分行排版 ==========
   规则：每行最多 14 字（含标点），优先在标点后换行；
   每行 8—14 字，末行 ≥5 字，整体协调自然 */
function wrapQuoteText(text){
  var N=text.length;
  if(N<=14) return [text];
  var PUNCT='，。、；：！？';
  var goodPos=[];
  for(var i=1;i<N;i++){
    var prev=text[i-1];
    if(PUNCT.indexOf(prev)>=0) goodPos.push(i);
    var c=text[i];
    if('就又也要便而以'.indexOf(c)>=0) goodPos.push(i);
  }
  var lines=[],start=0;
  while(start<N){
    var remaining=N-start;
    if(remaining>=5 && remaining<=14){lines.push(text.substring(start));break;}
    var bestEnd=-1;var bestScore=-1/0;
    var hi=Math.min(start+14,N-5);
    for(var end=start+5;end<=hi;end++){
      var lineLen=end-start;
      if(lineLen>14) break;
      var score=0;
      var prevChar=text[end-1];
      if(PUNCT.indexOf(prevChar)>=0) score+=100;
      var nextChar=text[end];
      if('就又也要便而以'.indexOf(nextChar)>=0) score+=30;
      if(lineLen>=8&&lineLen<=14) score+=20;
      else if(lineLen>=6) score+=5;
      score-=Math.abs(lineLen-11)*2;
      var rest=N-end;
      if(rest>0&&rest<5) continue;
      if(score>bestScore){bestScore=score;bestEnd=end;}
    }
    if(bestEnd<0){
      for(var k=0;k<goodPos.length;k++){
        var gp=goodPos[k];
        if(gp>start&&gp<=start+14){var rest=N-gp;if(rest===0||rest>=5){bestEnd=gp;break;}}
      }
    }
    if(bestEnd<0){bestEnd=Math.min(start+14,N);while(bestEnd<N&&(N-bestEnd)>0&&(N-bestEnd)<5)bestEnd--;}
    lines.push(text.substring(start,bestEnd));
    start=bestEnd;
  }
  for(var i=1;i<lines.length;i++){
    if(lines[i].length<6&&lines[i-1].length+lines[i].length<=14){lines[i-1]+=lines[i];lines.splice(i,1);i--;}
  }
  return lines;
}

/* ========== 显示结果 ========== */
function showResult(idx,wq){
  var card=E('resultCard');
  var lines=wrapQuoteText(wq[0]);
  var html='';
  for(var i=0;i<lines.length;i++){
    html+='<div class="quote-line">'+lines[i]+'</div>';
  }
  E('resultText').innerHTML=html;
  E('resultSrcText').textContent=wq[1]+' · '+wq[2]+' · '+wq[3];
  E('resultAction').textContent=wq[5];
  E('resultLinkBtn').dataset.url=wq[4];
  card.classList.add('show');
}
